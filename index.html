<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<title>薪资追踪器</title>
<meta name="theme-color" content="#f5f5f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="薪资追踪">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230f9e6a'/%3E%3Ctext x='90' y='115' font-size='90' text-anchor='middle' font-family='system-ui' fill='white'%3E%24%3C/text%3E%3C/svg%3E">
<link rel="manifest" id="pwa-manifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  /* 背景层次 */
  --bg:#f7f6f4; --bg2:#ffffff; --bg3:#f2f0ee; --bg4:#e8e5e1;
  --border:rgba(0,0,0,0.06); --border2:rgba(0,0,0,0.11);
  /* 文字 */
  --text:#2a2825; --text2:#5c5852; --text3:#9c9890;
  /* 莫兰迪主色 — 雾霾蓝（今日/出勤） */
  --sage:#6b8f8a; --sage-dim:rgba(107,143,138,0.12); --sage-dim2:rgba(107,143,138,0.07);
  /* 玫瑰豆沙（病假） */
  --rose:#b07070; --rose-dim:rgba(176,112,112,0.11);
  /* 藕粉（事假） */
  --mauve:#9e7e8f; --mauve-dim:rgba(158,126,143,0.11);
  /* 烟灰绿（年假） */
  --moss:#7a9070; --moss-dim:rgba(122,144,112,0.11);
  /* 暖沙（节假日） */
  --sand:#a89060; --sand-dim:rgba(168,144,96,0.10);
  --radius:12px; --radius-sm:8px;
}
body { font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; line-height:1.5; -webkit-font-smoothing:antialiased; }
.shell { max-width:860px; margin:0 auto; padding:max(40px,env(safe-area-inset-top)) max(20px,env(safe-area-inset-right)) max(80px,calc(env(safe-area-inset-bottom)+40px)) max(20px,env(safe-area-inset-left)); }

/* Header */
.header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; }
.header-left h1 { font-size:22px; font-weight:600; letter-spacing:-0.3px; }
.header-left p { font-size:13px; color:var(--text3); margin-top:3px; }
.clock-pill { display:flex; align-items:center; gap:8px; background:var(--bg3); border:1px solid var(--border); border-radius:99px; padding:6px 14px; font-size:13px; font-family:'JetBrains Mono',monospace; color:var(--text2); }
.clock-dot { width:6px; height:6px; border-radius:50%; background:var(--sage); animation:blink 2s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* Cards */
.card { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:20px; margin-bottom:12px; overflow:hidden; }
.card-title { font-size:11px; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--text3); margin-bottom:16px; }

/* Settings grid */
.set-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(0,1fr)); gap:12px; }
.set-grid.cols3 { grid-template-columns:repeat(3,1fr); }
.set-grid.cols2 { grid-template-columns:repeat(2,1fr); }
.set-grid.cols1 { grid-template-columns:1fr; }
.field { min-width:0; }
.field label { display:block; font-size:12px; font-weight:500; color:var(--text2); margin-bottom:5px; }
.field input { width:100%; min-width:0; background:var(--bg3); border:1px solid var(--border2); border-radius:var(--radius-sm); padding:9px 12px; font-size:16px; color:var(--text); font-family:'Inter',sans-serif; outline:none; transition:border-color 0.15s; }
.field input:focus { border-color:var(--sage); background:#fff; }
.field input[type="time"] { font-family:'JetBrains Mono',monospace; -webkit-appearance:none; appearance:none; text-align:center; }
.field input[type="number"] { font-family:'JetBrains Mono',monospace; }
.save-hint { font-size:12px; font-weight:500; color:var(--text2); margin-top:12px; }
.save-hint span { color:var(--sage); }
.section-divider { height:1px; background:var(--border); margin:16px 0; }
.subsection { font-size:11px; font-weight:600; color:var(--text3); letter-spacing:0.06em; text-transform:uppercase; margin-bottom:10px; margin-top:4px; }

/* Stat cards */
.stats-row { display:grid; grid-template-columns:repeat(auto-fit,minmax(160px,1fr)); gap:10px; margin-bottom:12px; }
.stat { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:16px 18px; position:relative; overflow:hidden; }
.stat::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; border-radius:var(--radius) var(--radius) 0 0; }
.stat.s-sage::before   { background:var(--sage); }
.stat.s-rose::before   { background:var(--rose); }
.stat.s-moss::before   { background:var(--moss); }
.stat.s-mauve::before  { background:var(--mauve); }
.stat.s-sand::before   { background:var(--sand); }
.stat .sl { font-size:11px; font-weight:500; color:var(--text2); margin-bottom:6px; letter-spacing:0.03em; }
.stat .sv { font-size:24px; font-weight:600; font-family:'JetBrains Mono',monospace; letter-spacing:-0.5px; line-height:1; margin-bottom:5px; }
.stat.s-sage  .sv { color:var(--sage); }
.stat.s-rose  .sv { color:var(--rose); }
.stat.s-moss  .sv { color:var(--moss); }
.stat.s-mauve .sv { color:var(--mauve); }
.stat.s-sand  .sv { color:var(--sand); }
.stat .ss { font-size:11px; font-weight:500; color:var(--text2); }

/* Progress */
.prog-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:5px; }
.prog-label { font-size:12px; font-weight:500; color:var(--text2); }
.prog-pct { font-size:12px; font-weight:500; font-family:'JetBrains Mono',monospace; color:var(--text2); }
.prog-track { height:5px; background:var(--bg4); border-radius:99px; overflow:hidden; margin-bottom:12px; }
.prog-fill { height:100%; border-radius:99px; transition:width 0.5s cubic-bezier(.4,0,.2,1); }
.prog-fill.g { background:var(--sage); }
.prog-fill.p { background:var(--mauve); }

/* Summary grid */
.summary-grid { display:grid; grid-template-columns:1fr 1fr; gap:2px; margin-top:4px; }
.sum-row { display:flex; justify-content:space-between; align-items:center; padding:9px 13px; background:var(--bg3); font-size:13px; }
.sum-row:first-child { border-radius:var(--radius-sm) 0 0 0; }
.sum-row:nth-child(2) { border-radius:0 var(--radius-sm) 0 0; }
.sum-row:nth-last-child(2) { border-radius:0 0 0 var(--radius-sm); }
.sum-row:last-child { border-radius:0 0 var(--radius-sm) 0; }
.sum-row.full { grid-column:1/-1; border-radius:0; }
.sum-row.full:last-child { border-radius:0 0 var(--radius-sm) var(--radius-sm); }
.sk { color:var(--text2); font-weight:500; }
.sv2 { font-family:'JetBrains Mono',monospace; font-weight:600; }
.sv2.sage  { color:var(--sage); }
.sv2.rose  { color:var(--rose); }
.sv2.mauve { color:var(--mauve); }
.sv2.moss  { color:var(--moss); }
.sv2.sand  { color:var(--sand); }

/* Notes */
.info-note { border-radius:var(--radius-sm); padding:10px 13px; font-size:12px; margin-top:12px; line-height:1.6; font-weight:500; }
.info-note.rose  { background:var(--rose-dim);  border:1px solid rgba(176,112,112,0.2); color:var(--rose); }
.info-note.moss  { background:var(--moss-dim);  border:1px solid rgba(122,144,112,0.2); color:var(--moss); }

/* Calendar */
.cal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
.cal-month { font-size:15px; font-weight:600; }
.cal-meta { font-size:12px; font-weight:500; color:var(--text2); background:var(--bg3); border:1px solid var(--border); border-radius:99px; padding:4px 12px; }
.cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:3px; }
.cal-head { font-size:11px; font-weight:600; text-align:center; padding:3px 0 7px; color:var(--text2); }
.cal-head.we { color:var(--text3); font-weight:500; }
.cal-cell { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border-radius:6px; font-size:13px; font-weight:500; cursor:pointer; position:relative; user-select:none; border:1px solid transparent; transition:background 0.1s; overflow:hidden; }
.cal-cell.empty { cursor:default; }
.cal-cell.weekend { color:var(--text3); background:var(--bg3); cursor:default; font-weight:400; }
.cal-cell.holiday { background:var(--sand-dim); color:var(--sand); cursor:default; font-weight:600; }
.cal-cell.workday { color:var(--text); }
.cal-cell.workday:hover { background:var(--bg3); }
.cal-cell.future { color:var(--text3); font-weight:400; cursor:default; }
.cal-cell canvas { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; }
.cal-cell .day-num { position:relative; z-index:1; font-size:13px; font-weight:600; }
.cal-cell.today .day-num { color:var(--sage); }

/* Legend */
.legend { display:flex; flex-wrap:wrap; gap:10px; margin-top:16px; padding-top:14px; border-top:1px solid var(--border); }
.legend-item { display:flex; align-items:center; gap:5px; font-size:11px; font-weight:500; color:var(--text2); }
.ld { width:8px; height:8px; border-radius:2px; }
.ld-normal  { background:var(--sage); }
.ld-sick    { background:var(--rose); }
.ld-leave   { background:var(--mauve); }
.ld-annual  { background:var(--moss); }
.ld-holiday { background:var(--sand-dim); border:1px solid rgba(168,144,96,0.3); }
.ld-weekend { background:var(--bg4); border:1px solid var(--border2); }
.tip { font-size:11px; font-weight:500; color:var(--text3); text-align:center; margin-top:8px; }

/* Modal */
.modal-overlay { position:fixed; inset:0; background:rgba(42,40,37,0.4); z-index:100; display:flex; align-items:flex-end; justify-content:center; padding-bottom:env(safe-area-inset-bottom); }
.modal-overlay.hidden { display:none; }
.modal { background:var(--bg2); border-radius:20px 20px 0 0; width:100%; max-width:480px; padding:20px 20px calc(20px + env(safe-area-inset-bottom)); }
.modal-title { font-size:15px; font-weight:600; margin-bottom:16px; text-align:center; }
.modal-date { font-size:13px; color:var(--text3); text-align:center; margin-bottom:16px; margin-top:-10px; }
.modal-types { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:16px; }
.type-btn { padding:8px 4px; border-radius:var(--radius-sm); border:1.5px solid var(--border2); background:var(--bg3); font-size:12px; font-weight:500; color:var(--text2); cursor:pointer; text-align:center; transition:all 0.12s; }
.type-btn.active-sage  { border-color:var(--sage);  background:var(--sage-dim2); color:var(--sage); }
.type-btn.active-rose  { border-color:var(--rose);  background:var(--rose-dim);  color:var(--rose); }
.type-btn.active-mauve { border-color:var(--mauve); background:var(--mauve-dim); color:var(--mauve); }
.type-btn.active-moss  { border-color:var(--moss);  background:var(--moss-dim);  color:var(--moss); }
.modal-hours { margin-bottom:16px; }
.modal-hours label { font-size:13px; font-weight:500; color:var(--text2); display:block; margin-bottom:8px; }
.hours-row { display:flex; align-items:center; gap:10px; }
.hours-row input[type=range] { flex:1; accent-color:var(--sage); }
.hours-val { font-size:15px; font-weight:600; font-family:'JetBrains Mono',monospace; color:var(--text); min-width:48px; text-align:right; }
.modal-btns { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
.btn { padding:12px; border-radius:var(--radius-sm); font-size:14px; font-weight:500; cursor:pointer; border:none; transition:opacity 0.12s; }
.btn:active { opacity:0.75; }
.btn-cancel  { background:var(--bg3); color:var(--text2); }
.btn-confirm { background:var(--sage); color:#fff; }

@media (max-width:600px) {
  .shell { padding:max(24px,env(safe-area-inset-top)) max(16px,env(safe-area-inset-right)) max(60px,calc(env(safe-area-inset-bottom)+32px)) max(16px,env(safe-area-inset-left)); }
  .header { margin-bottom:20px; }
  .header-left h1 { font-size:18px; }
  .clock-pill { font-size:12px; padding:5px 11px; }
  .card { padding:16px; margin-bottom:10px; }
  .set-grid.cols3 { grid-template-columns:repeat(2,1fr); }
  .set-grid.cols3 .field:last-child { grid-column:1/-1; }
  .set-grid.cols2 { grid-template-columns:repeat(2,1fr); }
  .field { min-width:0; overflow:hidden; }
  .field input { width:100%; min-width:0; box-sizing:border-box; }
  .stats-row { grid-template-columns:1fr 1fr; }
  .stat { padding:14px; }
  .stat .sv { font-size:20px; }
  .stat .sl { font-size:10px; }
  .summary-grid { grid-template-columns:1fr; }
  .sum-row:first-child       { border-radius:var(--radius-sm) var(--radius-sm) 0 0; }
  .sum-row:nth-child(2)      { border-radius:0; }
  .sum-row:nth-last-child(2) { border-radius:0; }
  .sum-row:last-child        { border-radius:0 0 var(--radius-sm) var(--radius-sm); }
  .sum-row.full:last-child   { border-radius:0 0 var(--radius-sm) var(--radius-sm); }
  .modal-types { grid-template-columns:repeat(2,1fr); }
  .cal-cell { font-size:12px; }
  .cal-head { font-size:11px; }
}
</style>
</head>
<body>
<div class="shell">
  <div class="header">
    <div class="header-left">
      <h1>薪资追踪器</h1>
      <p id="month-title">加载中…</p>
    </div>
    <div class="clock-pill"><span class="clock-dot"></span><span id="clock">--:--:--</span></div>
  </div>

  <!-- 设置 -->
  <div class="card">
    <div class="card-title">薪资设置</div>
    <div class="set-grid cols1" style="margin-bottom:12px;">
      <div class="field"><label>月薪（税前，元）</label><input type="number" id="salary" value="8000" min="0" step="100"></div>
    </div>
    <div class="set-grid cols2">
      <div class="field"><label>五险一金月扣款（元）</label><input type="number" id="insurance" value="0" min="0" step="10"></div>
      <div class="field" style="display:flex;align-items:flex-end;"><div style="font-size:12px;color:var(--text3);padding-bottom:10px;line-height:1.5;">时薪按税前月薪计算<br>五险一金最终扣除</div></div>
    </div>

    <div class="section-divider"></div>
    <div class="subsection">工作时间</div>
    <div class="set-grid cols2" style="margin-bottom:12px;">
      <div class="field"><label>上班时间</label><input type="time" id="start-time" value="09:00"></div>
      <div class="field"><label>下班时间</label><input type="time" id="end-time" value="18:00"></div>
    </div>
    <div class="set-grid cols3">
      <div class="field"><label>午休开始</label><input type="time" id="break-start" value="12:00"></div>
      <div class="field"><label>午休结束</label><input type="time" id="break-end" value="13:00"></div>
      <div class="field"><label style="display:flex;align-items:center;gap:6px;"><input type="checkbox" id="has-break" checked style="width:auto;min-width:0;background:none;border:none;padding:0;font-size:14px;"> 有午休</label><div style="font-size:12px;color:var(--text3);margin-top:8px;" id="work-hours-label">实际工时 8h</div></div>
    </div>

    <div class="save-hint">设置自动保存，下次打开无需重填 <span id="saved-ts"></span></div>
  </div>

  <!-- 数字卡片 -->
  <div class="stats-row">
    <div class="stat s-sage">
      <div class="sl">今日已赚</div>
      <div class="sv" id="today-earned">0.00</div>
      <div class="ss" id="today-sub">元</div>
    </div>
    <div class="stat s-rose">
      <div class="sl">本月税前到手</div>
      <div class="sv" id="month-gross">0.00</div>
      <div class="ss">元</div>
    </div>
    <div class="stat s-moss">
      <div class="sl">扣五险一金后</div>
      <div class="sv" id="month-net">0.00</div>
      <div class="ss">元</div>
    </div>
    <div class="stat s-mauve">
      <div class="sl">时薪</div>
      <div class="sv" id="hourly-show">0.00</div>
      <div class="ss">元/h · 日薪 <span id="daily-show">0</span> 元</div>
    </div>
  </div>

  <!-- 进度 + 汇总 -->
  <div class="card">
    <div class="prog-row"><span class="prog-label">今日工作进度</span><span class="prog-pct" id="prog-day-pct">0%</span></div>
    <div class="prog-track"><div class="prog-fill g" id="prog-day" style="width:0%"></div></div>
    <div class="prog-row"><span class="prog-label">本月出勤进度</span><span class="prog-pct" id="prog-month-pct">0%</span></div>
    <div class="prog-track" style="margin-bottom:4px;"><div class="prog-fill p" id="prog-month" style="width:0%"></div></div>

    <div class="summary-grid" id="summary-grid">
      <div class="sum-row"><span class="sk">本月工作日</span><span class="sv2" id="s-totalwd">— 天</span></div>
      <div class="sum-row"><span class="sk">正常出勤</span><span class="sv2 sage" id="s-normal">— 天</span></div>
      <div class="sum-row"><span class="sk">病假</span><span class="sv2 rose" id="s-sick">— h</span></div>
      <div class="sum-row"><span class="sk">事假</span><span class="sv2 mauve" id="s-leave">— h</span></div>
      <div class="sum-row"><span class="sk">年假</span><span class="sv2 moss" id="s-annual">— h</span></div>
      <div class="sum-row"><span class="sk">假期扣款</span><span class="sv2 rose" id="s-deduct">0.00 元</span></div>
      <div class="sum-row full"><span class="sk">未到工作日</span><span class="sv2" id="s-future" style="color:var(--text3)">— 天</span></div>
    </div>
    <div class="info-note rose" id="sick-note" style="display:none"></div>
    <div class="info-note moss"  id="annual-note" style="display:none"></div>
  </div>

  <!-- 日历 -->
  <div class="card">
    <div class="cal-header">
      <div class="cal-month" id="cal-title">…</div>
      <div class="cal-meta">点击工作日设置请假</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="legend">
      <div class="legend-item"><span class="ld ld-normal"></span>正常出勤</div>
      <div class="legend-item"><span class="ld ld-sick"></span>病假</div>
      <div class="legend-item"><span class="ld ld-leave"></span>事假</div>
      <div class="legend-item"><span class="ld ld-annual"></span>年假</div>
      <div class="legend-item"><span class="ld ld-holiday"></span>法定节假日</div>
      <div class="legend-item"><span class="ld ld-weekend"></span>周末</div>
    </div>
    <div class="tip">点击已过工作日 → 弹窗设置请假类型和时长</div>
  </div>

  <div style="text-align:center;padding:20px 0 6px;font-size:11px;color:var(--text3);">v1.1.0</div>
</div>

<!-- 请假弹窗 -->
<div class="modal-overlay hidden" id="modal-overlay">
  <div class="modal">
    <div class="modal-title">设置请假</div>
    <div class="modal-date" id="modal-date"></div>
    <div class="modal-types">
      <div class="type-btn" data-type="sick">病假</div>
      <div class="type-btn" data-type="leave">事假</div>
      <div class="type-btn" data-type="annual">年假</div>
      <div class="type-btn" data-type="normal">正常出勤</div>
    </div>
    <div class="modal-hours" id="modal-hours-wrap">
      <label id="modal-hours-label">请假时长</label>
      <div class="hours-row" id="slider-row">
        <input type="range" id="hours-slider" min="0.5" max="9" step="0.5" value="8">
        <div class="hours-val" id="hours-val">8h</div>
      </div>
      <div class="hours-row" id="annual-row" style="display:none;">
        <input type="number" id="annual-hours-input" min="0.5" step="0.5" value="8" style="flex:1;font-size:16px;font-family:'JetBrains Mono',monospace;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 12px;color:var(--text);outline:none;">
        <div class="hours-val">h</div>
      </div>
    </div>
    <div class="modal-btns">
      <button class="btn btn-cancel" id="modal-cancel">取消</button>
      <button class="btn btn-confirm" id="modal-confirm">确认</button>
    </div>
  </div>
</div>

<script>
/* ── 节假日数据 ── */
const CN_HOLIDAYS_2026 = new Set([
  "2026-01-01","2026-01-02","2026-01-03",

/* ── 当前时间 ── */
const now0      = new Date();

/* ── Storage ── */
const SK = 'salary_tracker_settings';

function saveSettings() {
  const ts = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  localStorage.setItem(SK, JSON.stringify({
    salary:     document.getElementById('salary').value,

function loadSettings() {
  try {
    const d = JSON.parse(localStorage.getItem(SK));
    if (!d) return;
    if (d.salary)     document.getElementById('salary').value      = d.salary;
    if (d.insurance !== undefined) document.getElementById('insurance').value = d.insurance;
    if (d.startTime)  document.getElementById('start-time').value  = d.startTime;

function saveStates() { localStorage.setItem(SS, JSON.stringify(dayStates)); }
function loadStates()  {
  try { const r = localStorage.getItem(SS); if (r) Object.assign(dayStates, JSON.parse(r)); } catch(e) {}
}

/* ── Helpers ── */
function ds(y, m, d) { return y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }
function isWorkday(y, m, d) {
  const k = ds(y,m,d), dow = new Date(y,m,d).getDay();
  const hols = y===2026 ? CN_HOLIDAYS_2026 : (y===2025 ? CN_HOLIDAYS_2025 : new Set());
  const wds  = y===2026 ? CN_WORKDAYS_2026  : (y===2025 ? CN_WORKDAYS_2025  : new Set());
  if (wds.has(k)) return true;
  if (hols.has(k)) return false;
  return dow !== 0 && dow !== 6;
}
function getWorkdaysInMonth(y, m) {
  const t = new Date(y,m+1,0).getDate(); let c=0;
  for (let d=1;d<=t;d++) if (isWorkday(y,m,d)) c++;
  return c;
}
function t2m(t) { const [h,mm]=t.split(':').map(Number); return h*60+mm; }
function fmt2(v) { return v.toLocaleString('zh-CN',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtPct(v) { return (Math.min(v,1)*100).toFixed(1)+'%'; }

/* ── 计算实际工时（分钟） ── */
function getWorkMins() {
  const s = t2m(document.getElementById('start-time').value);
  const e = t2m(document.getElementById('end-time').value);
  const hasBreak = document.getElementById('has-break').checked;
  let total = Math.max(e - s, 1);
  if (hasBreak) {
    const bs = t2m(document.getElementById('break-start').value);
    const be = t2m(document.getElementById('break-end').value);
    const breakMins = Math.max(Math.min(be,e) - Math.max(bs,s), 0);
    total = Math.max(total - breakMins, 1);
  }
  return total;
}

function getWorkHours() { return getWorkMins() / 60; }

/* ── 今日已工作分钟（排除午休） ── */
function getTodayWorkedMins() {
  const now = new Date();
  const nowM = now.getHours()*60 + now.getMinutes() + now.getSeconds()/60;
  const s = t2m(document.getElementById('start-time').value);
  const e = t2m(document.getElementById('end-time').value);
  const hasBreak = document.getElementById('has-break').checked;
  const bs = hasBreak ? t2m(document.getElementById('break-start').value) : 0;
  const be = hasBreak ? t2m(document.getElementById('break-end').value) : 0;

  if (nowM <= s) return 0;
  const clamp = Math.min(nowM, e);
  let worked = clamp - s;
  if (hasBreak) {
    const overlapStart = Math.max(s, bs);
    const overlapEnd   = Math.min(clamp, be);
    if (overlapEnd > overlapStart) worked -= (overlapEnd - overlapStart);
  }
  return Math.max(worked, 0);
}

/* ── init default states ── */
function initDefaultStates() {
  const t = new Date(CUR_YEAR, CUR_MONTH+1, 0).getDate();
  for (let d=1; d<=Math.min(TODAY,t); d++) {
    if (!isWorkday(CUR_YEAR,CUR_MONTH,d)) continue;
    const k = ds(CUR_YEAR,CUR_MONTH,d);
    if (!(k in dayStates)) dayStates[k] = {type:'normal', hours: getWorkHours()};
  }
}

/* ── 画饼图格子 ── */
const PIE_COLORS = {
  normal: '#6b8f8a', sick: '#b07070', leave: '#9e7e8f', annual: '#7a9070'
};

function drawCell(canvas, segments, isToday) {
  const dpr  = window.devicePixelRatio || 1;
  const size = canvas.offsetWidth || 40;
  canvas.width  = size * dpr;
  canvas.height = size * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, size, size);
  const total = segments.reduce((a,s)=>a+s.h, 0);
  if (total <= 0) return;
  const cx = size/2, cy = size/2;
  const r  = size * 0.34; // 缩小圆，留出白边
  let angle = -Math.PI/2;
  segments.forEach(seg => {
    const sweep = (seg.h/total) * Math.PI * 2;
    ctx.beginPath(); ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, angle, angle+sweep);
    ctx.closePath(); ctx.fillStyle = seg.color; ctx.fill();
    angle += sweep;
  });
  if (isToday) {
    ctx.beginPath(); ctx.arc(cx, cy, r+1.5, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(15,158,106,0.7)'; ctx.lineWidth = 1.5; ctx.stroke();
  }
}

/* ── Build calendar ── */
function buildCalendar() {
  const totalDays = new Date(CUR_YEAR,CUR_MONTH+1,0).getDate();
  const firstDow  = new Date(CUR_YEAR,CUR_MONTH,1).getDay();
  const workHours = getWorkHours();
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  ['日','一','二','三','四','五','六'].forEach((h,i)=>{
    const el = document.createElement('div');
    el.className = 'cal-head' + (i===0||i===6?' we':'');
    el.textContent = h; grid.appendChild(el);
  });

  for (let i=0;i<firstDow;i++) {
    const el=document.createElement('div'); el.className='cal-cell empty'; grid.appendChild(el);
  }

  for (let d=1; d<=totalDays; d++) {
    const k  = ds(CUR_YEAR,CUR_MONTH,d);
    const wd = isWorkday(CUR_YEAR,CUR_MONTH,d);
    const isToday  = d===TODAY;
    const isFuture = d>TODAY;
    const el = document.createElement('div');
    const numSpan = document.createElement('span');
    numSpan.className = 'day-num'; numSpan.textContent = d;
    el.appendChild(numSpan);

    if (!wd) {
      const dow = new Date(CUR_YEAR,CUR_MONTH,d).getDay();
      el.className = 'cal-cell ' + (dow===0||dow===6?'weekend':'holiday');
    } else if (isFuture) {
      el.className = 'cal-cell future';
    } else {
      el.className = 'cal-cell workday' + (isToday?' today':'');
      const state = dayStates[k] || {type:'normal', hours:workHours};
      // draw pie
      const canvas = document.createElement('canvas');
      canvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;';
      el.insertBefore(canvas, numSpan);
      // 等DOM渲染后再画，确保offsetWidth有值
      requestAnimationFrame(() => {
        const leaveH  = state.type==='normal' ? 0 : state.hours;
        const capH    = Math.min(leaveH, workHours);
        const normalH = Math.max(workHours - capH, 0);
        const segs = [];
        if (normalH > 0) segs.push({h:normalH, color: PIE_COLORS.normal});
        if (capH    > 0) segs.push({h:capH,    color: PIE_COLORS[state.type]||PIE_COLORS.normal});
        drawCell(canvas, segs, isToday);
      });
      el.addEventListener('click', ()=>openModal(k, d, workHours));
    }
    grid.appendChild(el);
  }
}

/* ── Modal ── */
let modalKey = null;
let modalWorkHours = 8;
let selectedType = 'sick';

function openModal(key, day, workHours) {
  modalKey = key; modalWorkHours = workHours;
  const state = dayStates[key] || {type:'normal', hours:workHours};
  selectedType = state.type === 'normal' ? 'sick' : state.type;

  const mnArr = ['一月','二月','三月','四月','五月','六月','七月','八月','九月','十月','十一月','十二月'];
  document.getElementById('modal-date').textContent = CUR_YEAR+'年'+mnArr[CUR_MONTH]+day+'日';

  // set type buttons
  document.querySelectorAll('.type-btn').forEach(btn => {
    btn.className = 'type-btn';
    if (btn.dataset.type === selectedType) {
      const colorMap = {sick:'amber',leave:'red',annual:'blue',normal:'green'};
      btn.className = 'type-btn active-' + (colorMap[selectedType]||'green');
    }
  });

  // slider max: 病假/事假不超过当天工时，年假不限制
  const slider = document.getElementById('hours-slider');
  slider.max = workHours;
  slider.step = 0.5;
  const initHours = state.type==='normal' ? workHours : state.hours;
  slider.value = Math.min(initHours, workHours);
  updateHoursLabel();
  updateModalHoursVisibility();
  // 年假单独设值（可超过workHours）
  if (state.type === 'annual') {
    document.getElementById('annual-hours-input').value = state.hours;
  }
  document.getElementById('modal-overlay').classList.remove('hidden');
}

function updateHoursLabel() {
  const v = parseFloat(document.getElementById('hours-slider').value);
  const wh = modalWorkHours;
  let label = v + 'h';
  if (Math.abs(v - wh/2) < 0.01) label += '（半天）';
  else if (Math.abs(v - wh) < 0.01) label += '（全天）';
  document.getElementById('hours-val').textContent = label;
}

function updateModalHoursVisibility() {
  const wrap = document.getElementById('modal-hours-wrap');
  wrap.style.display = selectedType === 'normal' ? 'none' : 'block';
  const lbl = document.getElementById('modal-hours-label');
  const typeNames = {sick:'病假时长', leave:'事假时长', annual:'年假时长'};
  lbl.textContent = typeNames[selectedType] || '请假时长';
  // 年假用数字输入框，其他用滑条
  document.getElementById('slider-row').style.display  = selectedType === 'annual' ? 'none' : 'flex';
  document.getElementById('annual-row').style.display  = selectedType === 'annual' ? 'flex' : 'none';
  if (selectedType !== 'annual') {
    document.getElementById('hours-slider').step = 0.5;
    document.getElementById('hours-slider').max  = modalWorkHours;
  }
}

document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', ()=>{
    selectedType = btn.dataset.type;
    const colorMap = {sick:'rose',leave:'mauve',annual:'moss',normal:'sage'};
    document.querySelectorAll('.type-btn').forEach(b=>b.className='type-btn');
    btn.className = 'type-btn active-' + (colorMap[selectedType]||'sage');
    updateModalHoursVisibility();
  });
});

document.getElementById('hours-slider').addEventListener('input', updateHoursLabel);

document.getElementById('modal-cancel').addEventListener('click', ()=>{
  document.getElementById('modal-overlay').classList.add('hidden');
});

document.getElementById('modal-overlay').addEventListener('click', e=>{
  if (e.target === document.getElementById('modal-overlay'))
    document.getElementById('modal-overlay').classList.add('hidden');
});

document.getElementById('modal-confirm').addEventListener('click', ()=>{
  if (!modalKey) return;
  let hours;
  if (selectedType === 'annual') {
    hours = parseFloat(document.getElementById('annual-hours-input').value) || modalWorkHours;
  } else {
    hours = parseFloat(document.getElementById('hours-slider').value);
  }
  if (selectedType === 'normal') {
    dayStates[modalKey] = {type:'normal', hours: modalWorkHours};
  } else if (selectedType === 'annual') {
    dayStates[modalKey] = {type:'annual', hours: Math.max(hours, 0.5)};
  } else {
    dayStates[modalKey] = {type: selectedType, hours: Math.min(hours, modalWorkHours)};
  }
  saveStates(); buildCalendar(); update();
  document.getElementById('modal-overlay').classList.add('hidden');
});

/* ── Main update ── */
function update() {
  const salary    = parseFloat(document.getElementById('salary').value) || 0;
  const insurance = parseFloat(document.getElementById('insurance').value) || 0;
  const workHours = getWorkHours();
  const workMins  = workHours * 60;

  const totalWorkDays = getWorkdaysInMonth(CUR_YEAR, CUR_MONTH);
  const dailySalary   = totalWorkDays > 0 ? salary / totalWorkDays : 0;
  const hourlySalary  = workHours > 0 ? dailySalary / workHours : 0;
  const sickHourly    = (GZ_MIN_MONTHLY / AVG_WORK_DAYS) / workHours;
  const halfDay       = workHours / 2;

  // update work hours label
  document.getElementById('work-hours-label').textContent = '实际工时 ' + workHours.toFixed(1).replace('.0','') + 'h';

  // count days/hours
  let normalDays=0, sickH=0, leaveH=0, annualH=0, futureDays=0;
  const totalDays = new Date(CUR_YEAR,CUR_MONTH+1,0).getDate();
  for (let d=1; d<=totalDays; d++) {
    if (!isWorkday(CUR_YEAR,CUR_MONTH,d)) continue;
    if (d > TODAY) { futureDays++; continue; }
    const k = ds(CUR_YEAR,CUR_MONTH,d);
    const st = dayStates[k] || {type:'normal', hours:workHours};
    if (st.type==='normal') normalDays++;
    else if (st.type==='sick')   sickH   += st.hours;
    else if (st.type==='leave')  leaveH  += st.hours;
    else if (st.type==='annual') annualH += st.hours;
  }

  // today
  const todayKey   = ds(CUR_YEAR,CUR_MONTH,TODAY);
  const isTodayWD  = isWorkday(CUR_YEAR,CUR_MONTH,TODAY);
  const todaySt    = dayStates[todayKey] || {type:'normal', hours:workHours};
  let todayEarned  = 0;
  let todayPct     = 0;

  if (isTodayWD) {
    if (todaySt.type === 'normal') {
      const workedMins = getTodayWorkedMins();
      todayPct = Math.min(workedMins / workMins, 1);
      todayEarned = dailySalary * todayPct;
    } else if (todaySt.type === 'annual') {
      todayEarned = dailySalary * (todaySt.hours / workHours);
      todayPct = 1;
    } else if (todaySt.type === 'sick') {
      todayEarned = sickHourly * todaySt.hours;
      todayPct = 1;
    } else if (todaySt.type === 'leave') {
      const normalH2 = Math.max(workHours - todaySt.hours, 0);
      todayEarned = dailySalary * (normalH2 / workHours);
      todayPct = 1;
    }
  }

  // past earnings
  let pastEarned=0, sickPay=0, leaveDeduct=0;
  for (let d=1; d<TODAY; d++) {
    if (!isWorkday(CUR_YEAR,CUR_MONTH,d)) continue;
    const k  = ds(CUR_YEAR,CUR_MONTH,d);
    const st = dayStates[k] || {type:'normal', hours:workHours};
    if (st.type==='normal') {
      pastEarned += dailySalary;
    } else if (st.type==='annual') {
      pastEarned += dailySalary;
    } else if (st.type==='sick') {
      const pay = sickHourly * st.hours;
      const norm = dailySalary * (Math.max(workHours-st.hours,0)/workHours);
      pastEarned += pay + norm; sickPay += pay;
    } else if (st.type==='leave') {
      const norm = dailySalary * (Math.max(workHours-st.hours,0)/workHours);
      pastEarned += norm; leaveDeduct += dailySalary * (st.hours/workHours);
    }
  }
  // today deduct calc
  if (isTodayWD && todaySt.type==='sick')  sickPay    += sickHourly * todaySt.hours;
  if (isTodayWD && todaySt.type==='leave') leaveDeduct+= dailySalary * (todaySt.hours/workHours);

  const totalGross   = pastEarned + todayEarned;
  const totalNet     = Math.max(totalGross - insurance, 0);
  const workedSoFar  = normalDays + (sickH>0?1:0) + (leaveH>0?1:0) + (annualH>0?1:0);
  const monthPct     = totalWorkDays > 0 ? (totalWorkDays - futureDays) / totalWorkDays : 0;

  // DOM
  document.getElementById('today-earned').textContent = fmt2(todayEarned);
  const inBreak = isInBreak();
  document.getElementById('today-sub').textContent = inBreak ? '午休中 · 暂停计算' : '元 · 完成 '+fmtPct(todayPct);
  document.getElementById('month-gross').textContent = fmt2(totalGross);
  document.getElementById('month-net').textContent   = fmt2(totalNet);
  document.getElementById('hourly-show').textContent = fmt2(hourlySalary);
  document.getElementById('daily-show').textContent  = Math.round(dailySalary);

  document.getElementById('prog-day').style.width       = (todayPct*100).toFixed(1)+'%';
  document.getElementById('prog-day-pct').textContent   = fmtPct(todayPct);
  document.getElementById('prog-month').style.width     = (Math.min(monthPct,1)*100).toFixed(1)+'%';
  document.getElementById('prog-month-pct').textContent = fmtPct(monthPct);

  document.getElementById('s-totalwd').textContent = totalWorkDays + ' 天';
  document.getElementById('s-normal').textContent  = normalDays + ' 天';
  document.getElementById('s-sick').textContent    = sickH > 0 ? sickH.toFixed(1).replace('.0','') + ' h' : '0 h';
  document.getElementById('s-leave').textContent   = leaveH > 0 ? leaveH.toFixed(1).replace('.0','') + ' h' : '0 h';
  document.getElementById('s-annual').textContent  = annualH > 0 ? annualH.toFixed(1).replace('.0','') + ' h' : '0 h';
  document.getElementById('s-deduct').textContent  = fmt2(leaveDeduct) + ' 元';
  document.getElementById('s-future').textContent  = futureDays + ' 天';

  const sickNote = document.getElementById('sick-note');
  if (sickH > 0) {
    sickNote.style.display = 'block';
    sickNote.textContent = '病假按广州最低工资：2500 ÷ 21.75天 ÷ '+workHours.toFixed(1).replace('.0','')+'h ≈ '+fmt2(sickHourly)+' 元/h，共 '+sickH.toFixed(1).replace('.0','')+' h，合计 '+fmt2(sickPay)+' 元。';
  } else { sickNote.style.display='none'; }

  const annualNote = document.getElementById('annual-note');
  if (annualH > 0) {
    annualNote.style.display = 'block';
    annualNote.textContent = '年假按正常日薪计算，共 '+annualH.toFixed(1).replace('.0','')+' h。';
  } else { annualNote.style.display='none'; }
}

function isInBreak() {
  if (!document.getElementById('has-break').checked) return false;
  const now = new Date();
  const nowM = now.getHours()*60+now.getMinutes();
  const bs = t2m(document.getElementById('break-start').value);
  const be = t2m(document.getElementById('break-end').value);
  return nowM >= bs && nowM < be;
}

function tickClock() {
  const n=new Date();
  document.getElementById('clock').textContent =
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0')+':'+String(n.getSeconds()).padStart(2,'0');
}
