<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
<title>薪资追踪器</title>

<!-- PWA -->
<meta name="theme-color" content="#f5f5f7">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="薪资追踪">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230f9e6a'/%3E%3Ctext x='90' y='115' font-size='90' text-anchor='middle' font-family='system-ui' fill='white'%3E%24%3C/text%3E%3C/svg%3E">
<link rel="manifest" id="pwa-manifest">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:           #f5f5f7;
    --bg2:          #ffffff;
    --bg3:          #f0f0f2;
    --bg4:          #e4e4ea;
    --border:       rgba(0,0,0,0.07);
    --border2:      rgba(0,0,0,0.13);
    --text:         #111118;
    --text2:        #3a3a50;
    --text3:        #6a6a88;
    --green:        #0f9e6a;
    --green-dim:    rgba(15,158,106,0.10);
    --green-dim2:   rgba(15,158,106,0.06);
    --amber:        #c47d08;
    --amber-dim:    rgba(196,125,8,0.10);
    --red:          #d13b3b;
    --red-dim:      rgba(209,59,59,0.10);
    --purple:       #6c4fd4;
    --purple-dim:   rgba(108,79,212,0.10);
    --radius:    12px;
    --radius-sm:  8px;
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* Layout */
  .shell {
    max-width: 860px;
    margin: 0 auto;
    padding: max(40px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(80px, calc(env(safe-area-inset-bottom) + 40px)) max(20px, env(safe-area-inset-left));
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 40px;
  }
  .header-left h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  .header-left p {
    font-size: 13px;
    color: var(--text3);
    margin-top: 3px;
  }
  .clock-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 6px 14px;
    font-size: 13px;
    font-family: 'JetBrains Mono', monospace;
    color: var(--text2);
  }
  .clock-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 2s infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

  /* Settings card */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    overflow: hidden;
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 18px;
  }
  .settings-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(0, 1fr));
    gap: 16px;
    overflow: hidden;
  }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    min-width: 0;
    box-sizing: border-box;
    background: var(--bg3);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    font-size: 16px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    outline: none;
    transition: border-color 0.15s;
  }
  .field input:focus { border-color: var(--green); background: #fff; }
  .field input[type="time"] { font-family: 'JetBrains Mono', monospace; }
  .field { min-width: 0; }

  /* Stat cards row */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 16px;
  }
  .stat {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .stat::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .stat.s-green::before { background: var(--green); }
  .stat.s-amber::before { background: var(--amber); }
  .stat.s-purple::before { background: var(--purple); }
  .stat.s-red::before { background: var(--red); }
  .stat .s-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    margin-bottom: 8px;
    letter-spacing: 0.04em;
  }
  .stat .s-value {
    font-size: 26px;
    font-weight: 600;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: -0.5px;
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat.s-green .s-value { color: var(--green); }
  .stat.s-amber .s-value { color: var(--amber); }
  .stat.s-purple .s-value { color: var(--purple); }
  .stat.s-red .s-value { color: var(--red); }
  .stat .s-sub {
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
  }

  /* Progress bars */
  .progress-block { margin-bottom: 8px; }
  .prog-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .prog-label { font-size: 13px; font-weight: 500; color: var(--text2); }
  .prog-pct   { font-size: 13px; font-weight: 500; font-family: 'JetBrains Mono', monospace; color: var(--text2); }
  .prog-track {
    height: 5px;
    background: var(--bg4);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .prog-fill {
    height: 100%;
    border-radius: 99px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
  }
  .prog-fill.g { background: var(--green); }
  .prog-fill.p { background: var(--purple); }

  /* Calendar */
  .cal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }
  .cal-month {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }
  .cal-meta {
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 4px 12px;
  }
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
  }
  .cal-day-head {
    font-size: 12px;
    text-align: center;
    padding: 4px 0 8px;
    color: var(--text2);
    font-weight: 600;
  }
  .cal-day-head.we { color: var(--text3); font-weight: 500; }
  .cal-cell {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    position: relative;
    transition: background 0.1s;
    user-select: none;
    border: 1px solid transparent;
  }
  .cal-cell.empty { cursor: default; }
  /* 周末：浅灰底 */
  .cal-cell.weekend {
    color: var(--text3);
    background: var(--bg3);
    cursor: default;
    font-weight: 400;
  }
  /* 节假日：浅紫底 + 紫色字 */
  .cal-cell.holiday {
    background: var(--purple-dim);
    color: var(--purple);
    cursor: default;
    font-weight: 600;
  }
  /* 可点击工作日 */
  .cal-cell.workday { color: var(--text); font-weight: 500; }
  .cal-cell.workday:hover { background: var(--bg3); border-color: var(--border2); }
  .cal-cell.today {
    background: var(--green-dim);
    border-color: rgba(15,158,106,0.28);
    color: var(--green);
    font-weight: 700;
  }
  .cal-cell.normal { background: var(--green-dim2); color: #0a7a52; font-weight: 600; }
  .cal-cell.sick {
    background: var(--amber-dim);
    border-color: rgba(196,125,8,0.22);
    color: #9a6006;
    font-weight: 600;
  }
  .cal-cell.leave {
    background: var(--red-dim);
    border-color: rgba(209,59,59,0.22);
    color: #a82e2e;
    font-weight: 600;
  }
  /* 未来工作日：略淡，不可点 */
  .cal-cell.future { color: var(--text3); font-weight: 400; cursor: default; }
  .cal-cell .dot {
    position: absolute;
    bottom: 3px;
    left: 50%;
    transform: translateX(-50%);
    width: 3px; height: 3px;
    border-radius: 50%;
  }
  .cal-cell.normal .dot { background: var(--green); }
  .cal-cell.sick .dot { background: var(--amber); }
  .cal-cell.leave .dot { background: var(--red); }

  /* Legend */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    margin-top: 18px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text2);
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
  }
  .ld-normal  { background: var(--green); }
  .ld-sick    { background: var(--amber); }
  .ld-leave   { background: var(--red); }
  .ld-holiday { background: var(--purple-dim); border: 1px solid rgba(108,79,212,0.25); }
  .ld-weekend { background: var(--bg4); border: 1px solid var(--border2); }
  .ld-future  { background: transparent; border: 1px solid var(--border2); }

  /* Tip */
  .tip { font-size: 12px; font-weight: 500; color: var(--text2); text-align: center; margin-top: 10px; }

  /* Summary details */
  .summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    margin-top: 4px;
  }
  .summary-row {
    display: flex;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--bg3);
    font-size: 13px;
  }
  .summary-row:first-child { border-radius: var(--radius-sm) 0 0 0; }
  .summary-row:nth-child(2) { border-radius: 0 var(--radius-sm) 0 0; }
  .summary-row:nth-last-child(2) { border-radius: 0 0 0 var(--radius-sm); }
  .summary-row:last-child { border-radius: 0 0 var(--radius-sm) 0; }
  .summary-row .sk { color: var(--text2); font-weight: 500; }
  .summary-row .sv { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }
  .sv.green { color: var(--green); }
  .sv.amber { color: var(--amber); }
  .sv.red { color: var(--red); }

  /* Sick wage info */
  .info-note {
    background: rgba(196,125,8,0.08);
    border: 1px solid rgba(196,125,8,0.18);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--amber);
    margin-top: 16px;
    line-height: 1.6;
  }

  .save-hint { font-size: 12px; font-weight: 500; color: var(--text2); margin-top: 12px; }
  .save-hint span { color: var(--green); font-weight: 500; }

  @media (max-width: 600px) {
    .shell { padding: max(24px, env(safe-area-inset-top)) max(16px, env(safe-area-inset-right)) max(60px, calc(env(safe-area-inset-bottom) + 32px)) max(16px, env(safe-area-inset-left)); }

    /* Header */
    .header { margin-bottom: 24px; }
    .header-left h1 { font-size: 18px; }
    .header-left p { font-size: 12px; }
    .clock-pill { font-size: 12px; padding: 5px 11px; }

    /* Cards */
    .card { padding: 16px; margin-bottom: 12px; }
    .card-title { font-size: 10px; margin-bottom: 14px; }

    /* Settings: 月薪占满一行，时间两列 */
    .settings-grid { grid-template-columns: 1fr 1fr; gap: 10px; overflow: hidden; }
    .settings-grid .field:first-child { grid-column: 1 / -1; }
    .field { min-width: 0; overflow: hidden; }
    .field input { font-size: 16px; padding: 10px 12px; width: 100%; min-width: 0; box-sizing: border-box; }
    .field input[type="time"] { -webkit-appearance: none; appearance: none; text-align: center; }

    /* Stats: 2列 */
    .stats-row { grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .stat { padding: 14px; }
    .stat .s-label { font-size: 10px; margin-bottom: 6px; }
    .stat .s-value { font-size: 20px; }
    .stat .s-sub { font-size: 11px; }

    /* Progress */
    .prog-label { font-size: 12px; }
    .prog-pct { font-size: 12px; }

    /* Summary: 单列 */
    .summary-grid { grid-template-columns: 1fr; }
    .summary-row { padding: 10px 12px; font-size: 13px; }
    .summary-row:first-child       { border-radius: var(--radius-sm) var(--radius-sm) 0 0; }
    .summary-row:nth-child(2)      { border-radius: 0; }
    .summary-row:nth-last-child(2) { border-radius: 0; }
    .summary-row:last-child        { border-radius: 0 0 var(--radius-sm) var(--radius-sm); }

    /* Calendar */
    .cal-month { font-size: 15px; }
    .cal-meta { font-size: 11px; padding: 3px 10px; }
    .cal-grid { gap: 3px; }
    .cal-day-head { font-size: 11px; padding-bottom: 6px; }
    .cal-cell { font-size: 13px; border-radius: 6px; }
    .cal-cell .dot { width: 3px; height: 3px; bottom: 2px; }

    /* Legend */
    .legend { gap: 10px; margin-top: 14px; padding-top: 14px; flex-wrap: wrap; }
    .legend-item { font-size: 11px; }
    .legend-dot { width: 7px; height: 7px; }

    .tip { font-size: 11px; }
    .save-hint { font-size: 11px; }
    .info-note { font-size: 11px; }
  }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>薪资追踪器</h1>
      <p id="month-title">2026年6月 · 广州</p>
    </div>
    <div class="clock-pill">
      <span class="clock-dot"></span>
      <span id="clock">--:--:--</span>
    </div>
  </div>

  <!-- Settings -->
  <div class="card">
    <div class="card-title">基本设置</div>
    <div class="settings-grid">
      <div class="field">
        <label>月薪（税前，元）</label>
        <input type="number" id="salary" value="8000" min="0" step="100">
      </div>
      <div class="field">
        <label>上班时间</label>
        <input type="time" id="start-time" value="09:00">
      </div>
      <div class="field">
        <label>下班时间</label>
        <input type="time" id="end-time" value="18:00">
      </div>
    </div>
    <div class="save-hint">设置自动保存，下次打开无需重填 <span id="saved-ts"></span></div>
  </div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat s-green">
      <div class="s-label">今日已赚</div>
      <div class="s-value" id="today-earned">0.00</div>
      <div class="s-sub" id="today-sub">元 · 完成 0%</div>
    </div>
    <div class="stat s-amber">
      <div class="s-label">本月实际到手</div>
      <div class="s-value" id="month-actual">0.00</div>
      <div class="s-sub" id="month-actual-sub">元</div>
    </div>
    <div class="stat s-purple">
      <div class="s-label">日薪 / 时薪</div>
      <div class="s-value" id="daily-hourly">0 / 0</div>
      <div class="s-sub">元 · 本月 <span id="total-workdays">0</span> 个工作日</div>
    </div>
    <div class="stat s-red">
      <div class="s-label">假期扣款合计</div>
      <div class="s-value" id="deduct-total">0.00</div>
      <div class="s-sub" id="deduct-sub">元</div>
    </div>
  </div>

  <!-- Progress -->
  <div class="card">
    <div class="progress-block">
      <div class="prog-row">
        <span class="prog-label">今日工作进度</span>
        <span class="prog-pct" id="prog-day-pct">0%</span>
      </div>
      <div class="prog-track"><div class="prog-fill g" id="prog-day" style="width:0%"></div></div>
      <div class="prog-row">
        <span class="prog-label">本月出勤进度</span>
        <span class="prog-pct" id="prog-month-pct">0%</span>
      </div>
      <div class="prog-track"><div class="prog-fill p" id="prog-month" style="width:0%"></div></div>
    </div>
    <div class="summary-grid" id="summary-grid">
      <div class="summary-row"><span class="sk">正常出勤</span><span class="sv green" id="s-normal">0 天</span></div>
      <div class="summary-row"><span class="sk">病假天数</span><span class="sv amber" id="s-sick">0 天</span></div>
      <div class="summary-row"><span class="sk">事假天数</span><span class="sv red" id="s-leave">0 天</span></div>
      <div class="summary-row"><span class="sk">未到工作日</span><span class="sv" id="s-future" style="color:var(--text3)">0 天</span></div>
    </div>
    <div class="info-note" id="sick-note" style="display:none"></div>
  </div>

  <!-- Calendar -->
  <div class="card">
    <div class="cal-header">
      <div class="cal-month" id="cal-title">2026年6月</div>
      <div class="cal-meta" id="cal-meta">点击工作日切换状态</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div class="legend">
      <div class="legend-item"><span class="legend-dot ld-normal"></span>正常出勤</div>
      <div class="legend-item"><span class="legend-dot ld-sick"></span>病假（按广州最低工资）</div>
      <div class="legend-item"><span class="legend-dot ld-leave"></span>事假（无薪）</div>
      <div class="legend-item"><span class="legend-dot ld-holiday"></span>法定节假日</div>
      <div class="legend-item"><span class="legend-dot ld-weekend"></span>周末</div>
      <div class="legend-item"><span class="legend-dot ld-future"></span>未来工作日</div>
    </div>
    <div class="tip">点击已过工作日，循环切换：正常出勤 → 病假 → 事假 → 正常出勤</div>
  </div>

  <!-- 版本号 -->
  <div style="text-align:center; padding: 24px 0 8px; font-size: 11px; color: var(--text3);">
    v1.0.6
  </div>

</div>

<script>
const CN_HOLIDAYS_2026 = new Set([
  "2026-01-01","2026-01-02","2026-01-03",
  "2026-02-15","2026-02-16","2026-02-17","2026-02-18","2026-02-19","2026-02-20","2026-02-21","2026-02-22","2026-02-23",
  "2026-04-04","2026-04-05","2026-04-06",
  "2026-05-01","2026-05-02","2026-05-03","2026-05-04","2026-05-05",
  "2026-06-19","2026-06-20","2026-06-21",
  "2026-09-25","2026-09-26","2026-09-27",
  "2026-10-01","2026-10-02","2026-10-03","2026-10-04","2026-10-05","2026-10-06","2026-10-07"
]);
const CN_WORKDAYS_2026 = new Set(["2026-01-04","2026-02-14","2026-02-28","2026-05-09","2026-09-20","2026-10-10"]);

const CN_HOLIDAYS_2025 = new Set([
  "2025-01-01","2025-01-28","2025-01-29","2025-01-30","2025-01-31","2025-02-01","2025-02-02","2025-02-03","2025-02-04",
  "2025-04-04","2025-04-05","2025-04-06",
  "2025-05-01","2025-05-02","2025-05-03","2025-05-04","2025-05-05",
  "2025-05-31","2025-06-01","2025-06-02",
  "2025-10-01","2025-10-02","2025-10-03","2025-10-04","2025-10-05","2025-10-06","2025-10-07","2025-10-08",
  "2025-10-31","2025-11-01","2025-11-02"
]);
const CN_WORKDAYS_2025 = new Set(["2025-01-26","2025-02-08","2025-04-27","2025-09-28","2025-10-11"]);

const GZ_MIN_MONTHLY = 2500;
const AVG_WORK_DAYS = 21.75; // 国家法定月均工作天数
const SICK_DAILY = GZ_MIN_MONTHLY / AVG_WORK_DAYS; // ~114.94元/天

const dayStates = {}; // key: "YYYY-MM-DD", value: "normal"|"sick"|"leave"

const now = new Date();
const CUR_YEAR = now.getFullYear();
const CUR_MONTH = now.getMonth();
const TODAY = now.getDate();

const STORE_SETTINGS = 'salary_tracker_settings';
const STORE_STATES   = 'salary_tracker_states_' + CUR_YEAR + '_' + (CUR_MONTH + 1);

function saveSettings() {
  const ts = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  localStorage.setItem(STORE_SETTINGS, JSON.stringify({
    salary:    document.getElementById('salary').value,
    startTime: document.getElementById('start-time').value,
    endTime:   document.getElementById('end-time').value,
    savedAt:   ts
  }));
  const el = document.getElementById('saved-ts');
  if (el) el.textContent = '· 已于 ' + ts + ' 保存';
}

function loadSettings() {
  try {
    const raw = localStorage.getItem(STORE_SETTINGS);
    if (!raw) return;
    const d = JSON.parse(raw);
    if (d.salary)    document.getElementById('salary').value     = d.salary;
    if (d.startTime) document.getElementById('start-time').value = d.startTime;
    if (d.endTime)   document.getElementById('end-time').value   = d.endTime;
    const el = document.getElementById('saved-ts');
    if (el && d.savedAt) el.textContent = '· 上次保存于 ' + d.savedAt;
  } catch(e) {}
}

function saveStates() {
  localStorage.setItem(STORE_STATES, JSON.stringify(dayStates));
}

function loadStates() {
  try {
    const raw = localStorage.getItem(STORE_STATES);
    if (raw) Object.assign(dayStates, JSON.parse(raw));
  } catch(e) {}
}

function ds(y, m, d) {
  return y + '-' + String(m+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
}

function isWorkday(y, m, d) {
  const k = ds(y, m, d);
  const dow = new Date(y, m, d).getDay();
  const hols = y === 2026 ? CN_HOLIDAYS_2026 : (y === 2025 ? CN_HOLIDAYS_2025 : new Set());
  const wds = y === 2026 ? CN_WORKDAYS_2026 : (y === 2025 ? CN_WORKDAYS_2025 : new Set());
  if (wds.has(k)) return true;
  if (hols.has(k)) return false;
  return dow !== 0 && dow !== 6;
}

function getWorkdaysInMonth(y, m) {
  const total = new Date(y, m+1, 0).getDate();
  let c = 0;
  for (let d = 1; d <= total; d++) if (isWorkday(y,m,d)) c++;
  return c;
}

function t2m(t) {
  const [h, mm] = t.split(':').map(Number);
  return h * 60 + mm;
}

function fmt2(v) {
  return v.toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function fmtPct(v) {
  return (Math.min(v,1) * 100).toFixed(1) + '%';
}

// Initialize today and all past workdays as "normal"
(function initStates() {
  const totalDays = new Date(CUR_YEAR, CUR_MONTH+1, 0).getDate();
  for (let d = 1; d <= Math.min(TODAY, totalDays); d++) {
    if (isWorkday(CUR_YEAR, CUR_MONTH, d)) {
      const k = ds(CUR_YEAR, CUR_MONTH, d);
      if (!(k in dayStates)) dayStates[k] = 'normal';
    }
  }
})();

function buildCalendar() {
  const totalDays = new Date(CUR_YEAR, CUR_MONTH+1, 0).getDate();
  const firstDow = new Date(CUR_YEAR, CUR_MONTH, 1).getDay();
  const heads = ['日','一','二','三','四','五','六'];
  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  heads.forEach((h, i) => {
    const el = document.createElement('div');
    el.className = 'cal-day-head' + (i === 0 || i === 6 ? ' we' : '');
    el.textContent = h;
    grid.appendChild(el);
  });

  for (let i = 0; i < firstDow; i++) {
    const el = document.createElement('div');
    el.className = 'cal-cell empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= totalDays; d++) {
    const k = ds(CUR_YEAR, CUR_MONTH, d);
    const wd = isWorkday(CUR_YEAR, CUR_MONTH, d);
    const isToday = d === TODAY;
    const isPast = d < TODAY;
    const isFuture = d > TODAY;
    const el = document.createElement('div');
    el.textContent = d;

    if (!wd) {
      el.className = 'cal-cell ' + (new Date(CUR_YEAR, CUR_MONTH, d).getDay() === 0 || new Date(CUR_YEAR, CUR_MONTH, d).getDay() === 6 ? 'weekend' : 'holiday');
    } else if (isFuture) {
      el.className = 'cal-cell future';
    } else {
      const state = dayStates[k] || 'normal';
      el.className = 'cal-cell ' + (isToday ? 'today ' : '') + state;
      const dot = document.createElement('span');
      dot.className = 'dot';
      el.appendChild(dot);
      el.addEventListener('click', () => {
        const cur = dayStates[k] || 'normal';
        const next = cur === 'normal' ? 'sick' : cur === 'sick' ? 'leave' : 'normal';
        dayStates[k] = next;
        saveStates();
        buildCalendar();
        update();
      });
    }

    grid.appendChild(el);
  }
}

function update() {
  const salary = parseFloat(document.getElementById('salary').value) || 0;
  const startMins = t2m(document.getElementById('start-time').value);
  const endMins = t2m(document.getElementById('end-time').value);
  const workMins = Math.max(endMins - startMins, 1);

  const totalWorkDays = getWorkdaysInMonth(CUR_YEAR, CUR_MONTH);
  const dailySalary = totalWorkDays > 0 ? salary / totalWorkDays : 0;
  const hourlySalary = dailySalary / (workMins / 60);

  // Count states
  let normalDays = 0, sickDays = 0, leaveDays = 0, futureDays = 0;
  const totalDaysInMonth = new Date(CUR_YEAR, CUR_MONTH+1, 0).getDate();
  for (let d = 1; d <= totalDaysInMonth; d++) {
    if (!isWorkday(CUR_YEAR, CUR_MONTH, d)) continue;
    if (d > TODAY) { futureDays++; continue; }
    const k = ds(CUR_YEAR, CUR_MONTH, d);
    const state = dayStates[k] || 'normal';
    if (state === 'normal') normalDays++;
    else if (state === 'sick') sickDays++;
    else if (state === 'leave') leaveDays++;
  }

  // Today progress
  const nowD = new Date();
  const nowMins = nowD.getHours()*60 + nowD.getMinutes() + nowD.getSeconds()/60;
  const isTodayWork = isWorkday(CUR_YEAR, CUR_MONTH, TODAY);
  const todayKey = ds(CUR_YEAR, CUR_MONTH, TODAY);
  const todayState = dayStates[todayKey] || 'normal';
  let todayPct = 0;
  if (isTodayWork && todayState === 'normal') {
    if (nowMins < startMins) todayPct = 0;
    else if (nowMins >= endMins) todayPct = 1;
    else todayPct = (nowMins - startMins) / workMins;
  } else if (isTodayWork && todayState === 'sick') {
    todayPct = 1;
  }

  // Earnings
  const todayEarned = isTodayWork
    ? (todayState === 'normal' ? dailySalary * todayPct : todayState === 'sick' ? SICK_DAILY : 0)
    : 0;

  // Past days (before today)
  let pastEarned = 0, sickPay = 0, leaveDeduct = 0;
  for (let d = 1; d < TODAY; d++) {
    if (!isWorkday(CUR_YEAR, CUR_MONTH, d)) continue;
    const k = ds(CUR_YEAR, CUR_MONTH, d);
    const state = dayStates[k] || 'normal';
    if (state === 'normal') pastEarned += dailySalary;
    else if (state === 'sick') { pastEarned += SICK_DAILY; sickPay += SICK_DAILY; }
    else if (state === 'leave') { leaveDeduct += dailySalary; }
  }
  if (isTodayWork && todayState === 'sick') sickPay += SICK_DAILY;
  if (isTodayWork && todayState === 'leave') leaveDeduct += dailySalary;

  const totalEarned = pastEarned + todayEarned;
  const totalDeduct = leaveDeduct;
  const workedSoFar = normalDays + sickDays + leaveDays;
  const monthPct = totalWorkDays > 0 ? workedSoFar / totalWorkDays : 0;

  // DOM updates
  document.getElementById('today-earned').textContent = fmt2(todayEarned);
  document.getElementById('today-sub').textContent = '元 · 完成 ' + fmtPct(todayPct);
  document.getElementById('month-actual').textContent = fmt2(totalEarned);
  document.getElementById('month-actual-sub').textContent = '元 (含病假补贴)';
  document.getElementById('daily-hourly').textContent = Math.round(dailySalary) + ' / ' + fmt2(hourlySalary);
  document.getElementById('total-workdays').textContent = totalWorkDays;
  document.getElementById('deduct-total').textContent = fmt2(totalDeduct);
  document.getElementById('deduct-sub').textContent = leaveDays > 0 ? '事假 ' + leaveDays + ' 天无薪' : '暂无扣款';

  document.getElementById('prog-day').style.width = (todayPct * 100).toFixed(1) + '%';
  document.getElementById('prog-day-pct').textContent = fmtPct(todayPct);
  document.getElementById('prog-month').style.width = (Math.min(monthPct,1)*100).toFixed(1) + '%';
  document.getElementById('prog-month-pct').textContent = fmtPct(monthPct);

  document.getElementById('s-normal').textContent = normalDays + ' 天';
  document.getElementById('s-sick').textContent = sickDays + ' 天';
  document.getElementById('s-leave').textContent = leaveDays + ' 天';
  document.getElementById('s-future').textContent = futureDays + ' 天';

  const sickNote = document.getElementById('sick-note');
  if (sickDays > 0) {
    sickNote.style.display = 'block';
    sickNote.textContent = '病假工资按广州最低工资标准计算：2500元 ÷ 21.75天 ≈ ' + fmt2(SICK_DAILY) + '元/天，共 ' + sickDays + ' 天病假，合计补贴 ' + fmt2(sickPay) + ' 元。';
  } else {
    sickNote.style.display = 'none';
  }
}

function tickClock() {
  const n = new Date();
  const h = String(n.getHours()).padStart(2,'0');
  const m = String(n.getMinutes()).padStart(2,'0');
  const s = String(n.getSeconds()).padStart(2,'0');
  document.getElementById('clock').textContent = h + ':' + m + ':' + s;
}

// Month label
const mnNames = ['一','二','三','四','五','六','七','八','九','十','十一','十二'];
document.getElementById('month-title').textContent = CUR_YEAR + '年' + mnNames[CUR_MONTH] + '月 · 广州';
document.getElementById('cal-title').textContent = CUR_YEAR + '年' + mnNames[CUR_MONTH] + '月';

loadSettings();
loadStates();

['salary','start-time','end-time'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => { saveSettings(); update(); });
});

buildCalendar();
update();
tickClock();
setInterval(() => { tickClock(); update(); }, 1000);

/* ── PWA: Service Worker（network-first，版本号变更自动清缓存） ── */
if ('serviceWorker' in navigator) {
  const CACHE_VERSION = 'salary-tracker-v1.0.6';
  const swCode = `
const CACHE = '${CACHE_VERSION}';
self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    ).then(() => clients.claim())
  );
});
self.addEventListener('fetch', e => {
  if (e.request.method !== 'GET') return;
  e.respondWith(
    fetch(e.request)
      .then(res => {
        if (res.ok) {
          const clone = res.clone();
          caches.open(CACHE).then(c => c.put(e.request, clone));
        }
        return res;
      })
      .catch(() => caches.match(e.request))
  );
});
`;
  const swBlob = new Blob([swCode], { type: 'application/javascript' });
  navigator.serviceWorker.register(URL.createObjectURL(swBlob), { scope: './' })
    .then(reg => {
      reg.addEventListener('updatefound', () => {
        const newSW = reg.installing;
        newSW.addEventListener('statechange', () => {
          if (newSW.state === 'activated') {
            console.log('SW 已更新到', CACHE_VERSION);
          }
        });
      });
    })
    .catch(() => {});
}
